name: Build Resume PDF

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "resume.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        uses: pandoc/actions/setup@v1

      - name: Install Typst
        run: |
          wget -qO- https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar -xJ
          sudo mv typst*/typst /usr/local/bin/

      - name: Generate PDF
        run: |
          mkdir -p pdf
          pandoc resume.md -o pdf/resume.pdf --pdf-engine=typst

      - name: Commit updated PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pdf/resume.pdf

          git diff --cached --quiet || git commit -m "Update generated resume.pdf"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
